<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">
  <!-- Terminal rendering of a real credtype session (output copied verbatim
       from a container run on 2026-07-13). Tokens shown are synthetic. -->
  <rect width="1080" height="560" rx="10" fill="#1c2128"/>
  <rect width="1080" height="34" rx="10" fill="#2d333b"/>
  <rect y="24" width="1080" height="10" fill="#2d333b"/>
  <circle cx="20" cy="17" r="6" fill="#f47067"/>
  <circle cx="40" cy="17" r="6" fill="#e0b543"/>
  <circle cx="60" cy="17" r="6" fill="#57ab5a"/>
  <text x="540" y="22" text-anchor="middle" fill="#909dab">credtype — what key is this, and is it real?</text>

  <g fill="#adbac7">
    <text x="24" y="66"><tspan fill="#6cb6ff">$</tspan> credtype ghp_AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA</text>
    <text x="24" y="92">GitHub personal access token (classic)  <tspan fill="#f47067">[checksum FAILED]</tspan></text>
    <text x="24" y="116" fill="#768390">  checksum:   INVALID        <tspan fill="#909dab"># recomputed CRC-32 does not match</tspan></text>
    <text x="24" y="140" fill="#768390">  token:      ghp_AAAA****************************AAAA (40 chars)</text>

    <text x="24" y="188"><tspan fill="#6cb6ff">$</tspan> credtype AKIAIOSFODNN7EXAMPLE</text>
    <text x="24" y="214">AWS access key ID  <tspan fill="#e0b543">[no checksum]</tspan></text>
    <text x="24" y="238" fill="#768390">  account_id: 581039954779   <tspan fill="#909dab"># decoded from the Base32 body</tspan></text>

    <text x="24" y="286"><tspan fill="#6cb6ff">$</tspan> credtype eyJhbGciOiJub25lIn0.eyJ4IjoxfQ. ; echo "exit $?"</text>
    <text x="24" y="312">JSON Web Token  <tspan fill="#f47067">[checksum FAILED]</tspan></text>
    <text x="24" y="336" fill="#768390">  note: alg=none: this token is UNSIGNED — treat as untrusted</text>
    <text x="24" y="360" fill="#f47067">exit 1</text>

    <text x="24" y="408"><tspan fill="#6cb6ff">$</tspan> credtype 4111111111111111</text>
    <text x="24" y="432">Payment card number (PAN)  <tspan fill="#57ab5a">[checksum OK]</tspan>   <tspan fill="#768390">issuer: Visa, Luhn verifies</tspan></text>

    <text x="24" y="480"><tspan fill="#6cb6ff">$</tspan> credtype 9f8e7d6c5b4a39281706f5e4d3c2b1a0 ; echo "exit $?"</text>
    <text x="24" y="506">Unrecognised token  <tspan fill="#909dab"># charset=hex, entropy 4.00 — plausibly a secret</tspan></text>
    <text x="24" y="530" fill="#e0b543">exit 2</text>
  </g>
</svg>
